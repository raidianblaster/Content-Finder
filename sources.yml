# Content Finder — source configuration
#
# Edit this file from the GitHub web UI (mobile-friendly) to add/remove
# sources without touching Python.
#
# rss_sources:
#   name   — display name used in the digest and scoring
#   url    — must be https://
#   trust  — integer 0-5 credibility bonus applied by score_item()
#             0 (or omitted) = no bonus; 3 = highly trusted
#
# keyword_weights:
#   Integer keys (higher = more weight).  Terms are matched case-insensitively
#   against item title + summary.
#
# hn_queries:
#   Strings sent to the HN Algolia search API.

rss_sources:
