name: Daily AI digest

on:
  # 22:07 UTC = 06:07 Hong Kong (HKT, UTC+8)
  # GitHub Actions queues scheduled jobs behind paid traffic, and the queue
  # is heaviest at :00 and :30. Running at :30 was landing the digest around
  # 07:27 HKT (≈57 min late). Off-peak minutes typically deliver in <15 min,
  # so the digest now lands around 06:15–06:25 HKT. If you change this,
  # avoid :00 and :30 — see tests/test_workflow_schedule.py.
  schedule:
    - cron: "7 22 * * *"
  workflow_dispatch:  # also run manually from the Actions tab

permissions:
  contents: write   # needed to commit the generated digest back

env:
  # Node 20 is fully removed from runners September 2026. Checkout v6 and
  # setup-python v6 natively bundle Node 24 so no env-var workaround is needed,
  # but keep the flag as belt-and-suspenders for any transitive actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute date (Hong Kong time)
        id: date
        run: echo "today=$(TZ=Asia/Hong_Kong date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p docs/archive
          python content_finder.py \
            --days 2 \
            --top 30 \
            --format html \
            --out docs/index.html
          cp docs/index.html "docs/archive/${{ steps.date.outputs.today }}.html"
          # The archived copy lives one dir deeper, so its root-relative topbar
          # links (index.html / archive.html) need a ../ prefix or they 404.
          # relativize_archived_links() is the single, unit-tested source of
          # truth for that rewrite (replaces the old sed that missed index.html).
          python -c "import sys, content_finder as c; from pathlib import Path; p = Path(sys.argv[1]); p.write_text(c.relativize_archived_links(p.read_text()))" \
            "docs/archive/${{ steps.date.outputs.today }}.html"

      - name: Rebuild archive index
        run: python render_index.py

      - name: Build review page for today
        run: python review.py build "${{ steps.date.outputs.today }}"

      - name: Run judge triage (best-effort)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
        run: |
          # Haiku triage of today's filter log. Best-effort: if the API
          # call fails (auth, quota, rate limit, transient 5xx) the workflow
          # still publishes the digest. Worst case: the review page renders
          # without suspect highlights for that day.
          python judge.py run "${{ steps.date.outputs.today }}"
          # Rebuild so the just-written .judge.json is inlined into the HTML.
          python review.py build "${{ steps.date.outputs.today }}"

      - name: Refresh latest review alias
        run: |
          # docs/review/latest.html is the stable bookmark URL — a copy of
          # whichever date is freshest. The localStorage key inside the HTML
          # embeds the real date, so labels persist correctly even though the
          # URL is date-free. Runs after the judge step so latest.html
          # captures the highlighted version when judging succeeded.
          cp "docs/review/${{ steps.date.outputs.today }}.html" docs/review/latest.html

      - name: Rebuild review index
        run: |
          # docs/review/index.html — browsable list of past review pages.
          # Runs after latest.html so the index step can ignore aliases.
          python review.py build-index

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ dedup-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "digest: ${{ steps.date.outputs.today }}"
            git push
          fi
