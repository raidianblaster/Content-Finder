name: Daily AI digest

on:
  # 23:00 UTC = 07:00 Hong Kong (HKT, UTC+8)
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:  # also run manually from the Actions tab

permissions:
  contents: write   # needed to commit the generated digest back

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute date (Hong Kong time)
        id: date
        run: echo "today=$(TZ=Asia/Hong_Kong date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate digest
        run: |
          mkdir -p docs/archive
          python content_finder.py \
            --no-summarize \
            --format html \
            --days 2 \
            --top 30 \
            --out docs/index.html
          cp docs/index.html "docs/archive/${{ steps.date.outputs.today }}.html"

      - name: Rebuild archive index
        run: python render_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "digest: ${{ steps.date.outputs.today }}"
            git push
          fi
