name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        # NOTE: test_archive_first_row_has_today_modifier_and_pill is a
        # pre-existing time-dependent test (tests/test_archive_v2.py pins
        # `base = date(2026, 5, 26)`), so it only passes when run on that exact
        # date. Deselected here so CI is meaningful; tracked for a separate fix.
        run: |
          python -m pytest -q \
            --deselect "tests/test_archive_v2.py::test_archive_first_row_has_today_modifier_and_pill"

      - name: Key-free digest smoke (do-no-harm gate)
        # The guaranteed-free path must render with NO ANTHROPIC_API_KEY set.
        run: |
          python content_finder.py --no-summarize --days 2 --top 10 \
            --format html --out /tmp/smoke.html
          test -s /tmp/smoke.html
